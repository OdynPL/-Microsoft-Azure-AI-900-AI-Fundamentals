<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Logistic Regression – klasyfikacja binarna</text>
  <!-- Axes -->
  <line x1="35" y1="155" x2="270" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="35" y1="155" x2="35" y2="25" stroke="#333" stroke-width="1.5"/>
  <polygon points="270,155 264,151 264,159" fill="#333"/>
  <polygon points="35,25 31,31 39,31" fill="#333"/>
  <text x="155" y="172" text-anchor="middle" fill="#555" font-size="9">X (cecha)</text>
  <text x="14" y="90" text-anchor="middle" fill="#555" font-size="9" transform="rotate(-90,14,90)">P(Y=1)</text>
  <!-- Horizontal lines at 0 and 1 -->
  <line x1="35" y1="145" x2="270" y2="145" stroke="#E0E0E0" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="28" y="148" fill="#999" font-size="8">0</text>
  <line x1="35" y1="45" x2="270" y2="45" stroke="#E0E0E0" stroke-width="0.5" stroke-dasharray="3,3"/>
  <text x="28" y="48" fill="#999" font-size="8">1</text>
  <!-- 0.5 threshold -->
  <line x1="35" y1="95" x2="270" y2="95" stroke="#F59E0B" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="28" y="98" fill="#F59E0B" font-size="8">0.5</text>
  <!-- Sigmoid curve -->
  <path d="M40,143 C60,143 80,142 100,140 C120,135 135,125 150,95 C165,65 175,55 195,48 C215,45 240,44 265,43" fill="none" stroke="#DC3545" stroke-width="2.5"/>
  <!-- Class 0 points (bottom-left) -->
  <circle cx="55" cy="145" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="70" cy="143" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="85" cy="142" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="100" cy="140" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="115" cy="138" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="125" cy="130" r="5" fill="#4A90D9" opacity="0.8"/>
  <!-- Class 1 points (top-right) -->
  <circle cx="175" cy="58" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="190" cy="48" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="205" cy="46" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="220" cy="45" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="235" cy="44" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="250" cy="44" r="5" fill="#F59E0B" opacity="0.8"/>
  <!-- Decision boundary vertical -->
  <line x1="150" y1="35" x2="150" y2="155" stroke="#28A745" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="148" y="32" text-anchor="middle" fill="#28A745" font-size="8" font-weight="bold">granica</text>
  <!-- Info -->
  <rect x="290" y="28" width="178" height="135" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="300" y="46" fill="#333" font-size="11" font-weight="bold">Krzywa sigmoid</text>
  <text x="300" y="62" fill="#555" font-size="9">Wyjście: prawdopodobieństwo</text>
  <text x="300" y="75" fill="#555" font-size="9">P(Y=1) od 0 do 1</text>
  <circle cx="307" cy="92" r="4" fill="#4A90D9"/>
  <text x="316" y="96" fill="#333" font-size="9">Klasa 0 (np. zdrowy)</text>
  <circle cx="307" cy="108" r="4" fill="#F59E0B"/>
  <text x="316" y="112" fill="#333" font-size="9">Klasa 1 (np. chory)</text>
  <text x="300" y="130" fill="#555" font-size="9">Próg 0.5: P &gt; 0.5 → klasa 1</text>
  <text x="300" y="146" fill="#DC3545" font-size="9" font-style="italic">σ(z) = 1 / (1 + e⁻ᶻ)</text>
  <text x="300" y="158" fill="#555" font-size="9">Idealna do: spam, churn, TAK/NIE</text>
</svg>