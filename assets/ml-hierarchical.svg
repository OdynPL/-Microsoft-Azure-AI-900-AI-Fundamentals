<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Hierarchical Clustering – dendrogram</text>
  <!-- Dendrogram -->
  <!-- Level 0 - individual points -->
  <circle cx="50" cy="155" r="5" fill="#4A90D9"/>
  <text x="50" y="170" text-anchor="middle" fill="#555" font-size="8">A</text>
  <circle cx="90" cy="155" r="5" fill="#4A90D9"/>
  <text x="90" y="170" text-anchor="middle" fill="#555" font-size="8">B</text>
  <circle cx="130" cy="155" r="5" fill="#F59E0B"/>
  <text x="130" y="170" text-anchor="middle" fill="#555" font-size="8">C</text>
  <circle cx="170" cy="155" r="5" fill="#F59E0B"/>
  <text x="170" y="170" text-anchor="middle" fill="#555" font-size="8">D</text>
  <circle cx="210" cy="155" r="5" fill="#28A745"/>
  <text x="210" y="170" text-anchor="middle" fill="#555" font-size="8">E</text>
  <!-- Level 1 merge A-B -->
  <line x1="50" y1="150" x2="50" y2="120" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="90" y1="150" x2="90" y2="120" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="50" y1="120" x2="90" y2="120" stroke="#4A90D9" stroke-width="1.5"/>
  <!-- Level 1 merge C-D -->
  <line x1="130" y1="150" x2="130" y2="110" stroke="#F59E0B" stroke-width="1.5"/>
  <line x1="170" y1="150" x2="170" y2="110" stroke="#F59E0B" stroke-width="1.5"/>
  <line x1="130" y1="110" x2="170" y2="110" stroke="#F59E0B" stroke-width="1.5"/>
  <!-- Level 2 merge (AB)-(CD) -->
  <line x1="70" y1="120" x2="70" y2="75" stroke="#9333EA" stroke-width="1.5"/>
  <line x1="150" y1="110" x2="150" y2="75" stroke="#9333EA" stroke-width="1.5"/>
  <line x1="70" y1="75" x2="150" y2="75" stroke="#9333EA" stroke-width="1.5"/>
  <!-- Level 3 merge all -->
  <line x1="110" y1="75" x2="110" y2="42" stroke="#DC3545" stroke-width="1.5"/>
  <line x1="210" y1="150" x2="210" y2="42" stroke="#28A745" stroke-width="1.5"/>
  <line x1="110" y1="42" x2="210" y2="42" stroke="#DC3545" stroke-width="1.5"/>
  <!-- Cut line -->
  <line x1="35" y1="95" x2="230" y2="95" stroke="#DC3545" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="235" y="92" fill="#DC3545" font-size="8" font-weight="bold">cut → 3 klastry</text>
  <!-- Distance axis -->
  <text x="245" y="42" fill="#555" font-size="8">wysoka odległość</text>
  <text x="245" y="155" fill="#555" font-size="8">niska odległość</text>
  <line x1="240" y1="45" x2="240" y2="150" stroke="#999" stroke-width="0.8"/>
  <polygon points="240,45 237,50 243,50" fill="#999"/>
  <!-- Info -->
  <rect x="290" y="30" width="178" height="140" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="300" y="48" fill="#333" font-size="11" font-weight="bold">Dendrogram</text>
  <text x="300" y="64" fill="#555" font-size="9">Drzewo hierarchicznych</text>
  <text x="300" y="77" fill="#555" font-size="9">połączeń (aglomeracyjne)</text>
  <text x="300" y="95" fill="#555" font-size="9" font-weight="bold">Algorytm:</text>
  <text x="300" y="108" fill="#555" font-size="9">1. Każdy punkt = klaster</text>
  <text x="300" y="121" fill="#555" font-size="9">2. Łącz najbliższe pary</text>
  <text x="300" y="134" fill="#555" font-size="9">3. Powtarzaj do jednego</text>
  <text x="300" y="150" fill="#DC3545" font-size="9">Cięcie dendrogramu na</text>
  <text x="300" y="163" fill="#DC3545" font-size="9">wybranej wysokości = K klastrów</text>
</svg>