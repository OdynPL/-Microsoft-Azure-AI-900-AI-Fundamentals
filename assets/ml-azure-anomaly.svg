<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Azure Anomaly Detector – serie czasowe</text>
  <!-- Time series axes -->
  <line x1="30" y1="140" x2="270" y2="140" stroke="#333" stroke-width="1.5"/>
  <line x1="30" y1="140" x2="30" y2="30" stroke="#333" stroke-width="1.5"/>
  <text x="150" y="157" text-anchor="middle" fill="#555" font-size="9">Czas</text>
  <text x="14" y="85" text-anchor="middle" fill="#555" font-size="9" transform="rotate(-90,14,85)">Wartość</text>
  <!-- Expected range (gray band) -->
  <path d="M35,85 L60,80 L85,78 L110,82 L135,88 L160,85 L185,80 L210,78 L235,82 L260,85" fill="none" stroke="#4A90D9" stroke-width="0" opacity="0"/>
  <path d="M35,70 L60,65 L85,62 L110,68 L135,74 L160,70 L185,65 L210,62 L235,68 L260,70
           L260,100 L235,98 L210,95 L185,98 L160,102 L135,105 L110,100 L85,95 L60,98 L35,102 Z" fill="#4A90D9" opacity="0.1" stroke="none"/>
  <!-- Upper/lower bounds -->
  <path d="M35,70 L60,65 L85,62 L110,68 L135,74 L160,70 L185,65 L210,62 L235,68 L260,70" fill="none" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,2"/>
  <path d="M35,102 L60,98 L85,95 L110,100 L135,105 L160,102 L185,98 L210,95 L235,98 L260,100" fill="none" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Actual data line -->
  <path d="M35,86 L60,82 L85,78 L110,84 L135,40 L160,86 L185,80 L210,78 L235,120 L260,85" fill="none" stroke="#333" stroke-width="2"/>
  <!-- Normal data points -->
  <circle cx="35" cy="86" r="3" fill="#28A745"/>
  <circle cx="60" cy="82" r="3" fill="#28A745"/>
  <circle cx="85" cy="78" r="3" fill="#28A745"/>
  <circle cx="110" cy="84" r="3" fill="#28A745"/>
  <circle cx="160" cy="86" r="3" fill="#28A745"/>
  <circle cx="185" cy="80" r="3" fill="#28A745"/>
  <circle cx="210" cy="78" r="3" fill="#28A745"/>
  <circle cx="260" cy="85" r="3" fill="#28A745"/>
  <!-- Anomaly points -->
  <circle cx="135" cy="40" r="6" fill="none" stroke="#DC3545" stroke-width="2.5"/>
  <circle cx="135" cy="40" r="2.5" fill="#DC3545"/>
  <text x="135" y="33" text-anchor="middle" fill="#DC3545" font-size="7" font-weight="bold">spike!</text>
  <circle cx="235" cy="120" r="6" fill="none" stroke="#DC3545" stroke-width="2.5"/>
  <circle cx="235" cy="120" r="2.5" fill="#DC3545"/>
  <text x="235" y="132" text-anchor="middle" fill="#DC3545" font-size="7" font-weight="bold">dip!</text>
  <!-- Info -->
  <rect x="290" y="30" width="180" height="140" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="300" y="48" fill="#333" font-size="10" font-weight="bold">Gotowa usługa Azure</text>
  <text x="300" y="64" fill="#555" font-size="9">(wycofana 2023, ale na</text>
  <text x="300" y="77" fill="#555" font-size="9">egzaminie nadal się pojawia)</text>
  <text x="300" y="96" fill="#555" font-size="9" font-weight="bold">Tryby:</text>
  <text x="300" y="109" fill="#555" font-size="9">1. Entire series (batch)</text>
  <text x="300" y="122" fill="#555" font-size="9">2. Last point (real-time)</text>
  <text x="300" y="135" fill="#555" font-size="9">3. Change point detection</text>
  <text x="300" y="152" fill="#555" font-size="9">Automatycznie wykrywa:</text>
  <text x="300" y="165" fill="#DC3545" font-size="9">spikes, dips, trendy, sezonowość</text>
</svg>