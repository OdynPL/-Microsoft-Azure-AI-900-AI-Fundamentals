<svg width="1400" height="180" viewBox="0 0 1400 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Etap 1 -->

  <rect x="50" y="50" width="260" height="70" rx="20" fill="#e3f2fd" stroke="#1976d2" stroke-width="2.5"/>
  <text x="180" y="80" text-anchor="middle" alignment-baseline="middle" font-size="20" fill="#1976d2" font-family="Segoe UI, Arial" font-weight="bold">1. Identyfikacja</text>
  <text x="180" y="105" text-anchor="middle" alignment-baseline="middle" font-size="18" fill="#1976d2" font-family="Segoe UI, Arial">potencjalnych szkód</text>

  <!-- Etap 2 -->

  <rect x="370" y="50" width="260" height="70" rx="20" fill="#e8f5e9" stroke="#388e3c" stroke-width="2.5"/>
  <text x="500" y="85" text-anchor="middle" alignment-baseline="middle" font-size="20" fill="#388e3c" font-family="Segoe UI, Arial" font-weight="bold">2. Pomiar szkód</text>

  <!-- Etap 3 -->

  <rect x="690" y="50" width="260" height="70" rx="20" fill="#fffde7" stroke="#fbc02d" stroke-width="2.5"/>
  <text x="820" y="85" text-anchor="middle" alignment-baseline="middle" font-size="20" fill="#fbc02d" font-family="Segoe UI, Arial" font-weight="bold">3. Łagodzenie ryzyk</text>

  <!-- Etap 4 -->

  <rect x="1010" y="50" width="260" height="70" rx="20" fill="#fce4ec" stroke="#c2185b" stroke-width="2.5"/>
  <text x="1140" y="80" text-anchor="middle" alignment-baseline="middle" font-size="20" fill="#c2185b" font-family="Segoe UI, Arial" font-weight="bold">4. Planowanie</text>
  <text x="1140" y="105" text-anchor="middle" alignment-baseline="middle" font-size="18" fill="#c2185b" font-family="Segoe UI, Arial">wdrożenia</text>

  <!-- Strzałki -->
  <line x1="310" y1="85" x2="370" y2="85" stroke="#1976d2" stroke-width="2.5" marker-end="url(#arrow1)"/>
  <line x1="630" y1="85" x2="690" y2="85" stroke="#388e3c" stroke-width="2.5" marker-end="url(#arrow2)"/>
  <line x1="950" y1="85" x2="1010" y2="85" stroke="#fbc02d" stroke-width="2.5" marker-end="url(#arrow3)"/>

  <defs>
    <marker id="arrow1" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M3,3 L13,8 L3,13" fill="#1976d2" />
    </marker>
    <marker id="arrow2" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M3,3 L13,8 L3,13" fill="#388e3c" />
    </marker>
    <marker id="arrow3" markerWidth="16" markerHeight="16" refX="13" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M3,3 L13,8 L3,13" fill="#fbc02d" />
    </marker>
  </defs>
</svg>
