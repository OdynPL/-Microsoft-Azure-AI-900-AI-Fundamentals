<svg viewBox="0 0 780 180" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI,Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10z" fill="#94a3b8"/></marker>
  </defs>
  <rect width="780" height="180" fill="white" rx="12" stroke="#e2e8f0" stroke-width="1"/>
  <rect width="780" height="44" fill="#1e40af" rx="12"/><rect y="32" width="780" height="12" fill="#1e40af"/>
  <text x="390" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="white">Proces ML – 8 kroków</text>
  <!-- Step 1 -->
  <rect x="10" y="56" width="82" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="51" y="76" text-anchor="middle" font-size="14">📊</text>
  <text x="51" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af">1. Dane</text>
  <text x="51" y="104" text-anchor="middle" font-size="7" fill="#64748b">Zbieranie</text>
  <line x1="92" y1="86" x2="104" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Step 2 -->
  <rect x="110" y="56" width="82" height="60" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="151" y="76" text-anchor="middle" font-size="14">✂️</text>
  <text x="151" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">2. Podział</text>
  <text x="151" y="104" text-anchor="middle" font-size="7" fill="#64748b">Train/Val/Test</text>
  <line x1="192" y1="86" x2="204" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Step 3 -->
  <rect x="210" y="56" width="82" height="60" rx="8" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2"/>
  <text x="251" y="76" text-anchor="middle" font-size="14">🔧</text>
  <text x="251" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#6d28d9">3. Features</text>
  <text x="251" y="104" text-anchor="middle" font-size="7" fill="#64748b">Engineering</text>
  <line x1="292" y1="86" x2="304" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Step 4 -->
  <rect x="310" y="56" width="82" height="60" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="2"/>
  <text x="351" y="76" text-anchor="middle" font-size="14">🧠</text>
  <text x="351" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">4. Trening</text>
  <text x="351" y="104" text-anchor="middle" font-size="7" fill="#64748b">Uczenie modelu</text>
  <line x1="392" y1="86" x2="404" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Step 5 -->
  <rect x="410" y="56" width="82" height="60" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <text x="451" y="76" text-anchor="middle" font-size="14">📏</text>
  <text x="451" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af">5. Walidacja</text>
  <text x="451" y="104" text-anchor="middle" font-size="7" fill="#64748b">Tuning param.</text>
  <line x1="492" y1="86" x2="504" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Step 6 -->
  <rect x="510" y="56" width="82" height="60" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="551" y="76" text-anchor="middle" font-size="14">✅</text>
  <text x="551" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#065f46">6. Test</text>
  <text x="551" y="104" text-anchor="middle" font-size="7" fill="#64748b">Nowe dane</text>
  <line x1="592" y1="86" x2="604" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Step 7 -->
  <rect x="610" y="56" width="82" height="60" rx="8" fill="#fefce8" stroke="#f59e0b" stroke-width="2"/>
  <text x="651" y="76" text-anchor="middle" font-size="14">🚀</text>
  <text x="651" y="92" text-anchor="middle" font-size="9" font-weight="700" fill="#92400e">7. Deploy</text>
  <text x="651" y="104" text-anchor="middle" font-size="7" fill="#64748b">REST API</text>
  <line x1="692" y1="86" x2="704" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Step 8 -->
  <rect x="710" y="56" width="60" height="60" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
  <text x="740" y="76" text-anchor="middle" font-size="14">📈</text>
  <text x="740" y="92" text-anchor="middle" font-size="8" font-weight="700" fill="#dc2626">8. Monitor</text>
  <text x="740" y="104" text-anchor="middle" font-size="7" fill="#64748b">Drift</text>
  <!-- Feedback loop arrow -->
  <path d="M 740 116 L 740 146 Q 740 156 730 156 L 61 156 Q 51 156 51 146 L 51 118" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="390" y="150" text-anchor="middle" font-size="8" fill="#64748b">🔄 Retraining – ponowne trenowanie w przypadku spadku jakości / drift</text>
</svg>