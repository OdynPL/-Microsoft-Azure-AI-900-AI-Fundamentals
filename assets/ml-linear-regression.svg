<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Linear Regression – ŷ = wx + b</text>
  <!-- Grid -->
  <line x1="50" y1="30" x2="50" y2="155" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="100" y1="30" x2="100" y2="155" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="150" y1="30" x2="150" y2="155" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="200" y1="30" x2="200" y2="155" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="250" y1="30" x2="250" y2="155" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="50" x2="265" y2="50" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="80" x2="265" y2="80" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="110" x2="265" y2="110" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="35" y1="140" x2="265" y2="140" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Axes -->
  <line x1="35" y1="155" x2="270" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="35" y1="155" x2="35" y2="25" stroke="#333" stroke-width="1.5"/>
  <polygon points="270,155 264,151 264,159" fill="#333"/>
  <polygon points="35,25 31,31 39,31" fill="#333"/>
  <text x="155" y="172" text-anchor="middle" fill="#555" font-size="9">X (1 cecha)</text>
  <text x="14" y="90" text-anchor="middle" fill="#555" font-size="9" transform="rotate(-90,14,90)">Y</text>
  <!-- Points -->
  <circle cx="50" cy="142" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="65" cy="135" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="80" cy="125" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="100" cy="118" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="115" cy="108" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="130" cy="100" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="150" cy="90" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="165" cy="82" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="185" cy="72" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="200" cy="65" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="220" cy="55" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="240" cy="45" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <circle cx="255" cy="38" r="4.5" fill="#4A90D9" opacity="0.75"/>
  <!-- Line -->
  <line x1="42" y1="148" x2="262" y2="33" stroke="#DC3545" stroke-width="2.5"/>
  <!-- Residuals -->
  <line x1="80" y1="125" x2="80" y2="120" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="130" y1="100" x2="130" y2="94" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="200" y1="65" x2="200" y2="60" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Info box -->
  <rect x="290" y="28" width="178" height="135" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="300" y="46" fill="#333" font-size="11" font-weight="bold">Prosta liniowa</text>
  <text x="300" y="62" fill="#555" font-size="9">Jedna cecha X → przewidywanie Y</text>
  <text x="300" y="78" fill="#555" font-size="9">Linia minimalizuje sumę</text>
  <text x="300" y="91" fill="#555" font-size="9">kwadratów błędów (residuals)</text>
  <line x1="304" y1="102" x2="316" y2="102" stroke="#DC3545" stroke-width="2"/>
  <text x="320" y="106" fill="#333" font-size="9">Best fit line</text>
  <line x1="304" y1="118" x2="316" y2="118" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="320" y="122" fill="#333" font-size="9">Residuals (błędy)</text>
  <text x="300" y="140" fill="#DC3545" font-size="10" font-style="italic" font-weight="bold">ŷ = w·x + b</text>
  <text x="300" y="155" fill="#555" font-size="9">Metryki: R², RMSE, MAE</text>
</svg>