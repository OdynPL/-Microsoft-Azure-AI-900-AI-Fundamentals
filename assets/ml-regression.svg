<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="Segoe UI, sans-serif">
  <!-- Background -->
  <rect width="480" height="200" fill="#FAFCFF" rx="8"/>
  <!-- Title -->
  <text x="240" y="20" text-anchor="middle" fill="#0078D4" font-size="14" font-weight="bold">Linear Regression</text>
  <!-- Grid lines -->
  <line x1="60" y1="40" x2="60" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="110" y1="40" x2="110" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="160" y1="40" x2="160" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="210" y1="40" x2="210" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="260" y1="40" x2="260" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="40" y1="60" x2="270" y2="60" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="40" y1="90" x2="270" y2="90" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="40" y1="120" x2="270" y2="120" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="40" y1="150" x2="270" y2="150" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Axes -->
  <line x1="40" y1="170" x2="275" y2="170" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="170" x2="40" y2="35" stroke="#333" stroke-width="1.5"/>
  <!-- Axis arrows -->
  <polygon points="275,170 268,166 268,174" fill="#333"/>
  <polygon points="40,35 36,42 44,42" fill="#333"/>
  <!-- Axis labels -->
  <text x="160" y="190" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Powierzchnia (m²)</text>
  <text x="15" y="105" text-anchor="middle" fill="#333" font-size="11" font-weight="bold" transform="rotate(-90,15,105)">Cena (tys. zł)</text>
  <!-- Data points - scattered around regression line -->
  <circle cx="55" cy="158" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="68" cy="148" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="82" cy="142" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="90" cy="130" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="105" cy="128" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="115" cy="118" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="125" cy="122" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="140" cy="108" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="148" cy="100" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="160" cy="95" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="172" cy="88" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="185" cy="82" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="195" cy="76" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="210" cy="68" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="225" cy="58" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="238" cy="55" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="250" cy="48" r="5" fill="#4A90D9" opacity="0.8"/>
  <!-- Regression line -->
  <line x1="48" y1="162" x2="260" y2="44" stroke="#DC3545" stroke-width="2.5"/>
  <!-- Residual lines -->
  <line x1="82" y1="142" x2="82" y2="136" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="125" y1="122" x2="125" y2="112" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="172" y1="88" x2="172" y2="82" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Prediction example -->
  <circle cx="210" cy="68" r="5" fill="#4A90D9" opacity="0.8"/>
  <line x1="210" y1="170" x2="210" y2="68" stroke="#28A745" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="40" y1="68" x2="210" y2="68" stroke="#28A745" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="212" y="180" fill="#28A745" font-size="8">x₀</text>
  <text x="22" y="66" fill="#28A745" font-size="8">ŷ₀</text>
  <!-- Formula -->
  <text x="300" y="48" fill="#DC3545" font-size="16" font-weight="bold" font-style="italic">ŷ = w·x + b</text>
  <!-- Legend -->
  <rect x="295" y="60" width="170" height="125" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <circle cx="310" cy="78" r="4" fill="#4A90D9"/>
  <text x="320" y="82" fill="#333" font-size="10">Dane treningowe</text>
  <line x1="304" y1="96" x2="316" y2="96" stroke="#DC3545" stroke-width="2"/>
  <text x="320" y="100" fill="#333" font-size="10">Linia regresji (best fit)</text>
  <line x1="304" y1="114" x2="316" y2="114" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="320" y="118" fill="#333" font-size="10">Residuals (błędy)</text>
  <line x1="304" y1="132" x2="316" y2="132" stroke="#28A745" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="320" y="136" fill="#333" font-size="10">Predykcja nowej wartości</text>
  <text x="305" y="157" fill="#555" font-size="9" font-weight="bold">Cel: minimalizacja MSE</text>
  <text x="305" y="170" fill="#555" font-size="9" font-weight="bold">Metryki: R² | RMSE | MAE</text>
</svg>