<svg width="700" height="340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#fafdff"/>
      <stop offset="100%" stop-color="#e3eaf7"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#b0c4de"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 L2,5 z" fill="#888" />
    </marker>
  </defs>
  <rect width="700" height="340" fill="url(#bg)"/>
  <g font-family="Segoe UI, Arial" font-size="15">
    <text x="350" y="48" text-anchor="middle" font-size="28" fill="#1a355e" font-weight="bold">Przegląd usług Azure AI</text>
    <!-- Główne usługi -->
    <g filter="url(#shadow)">
      <rect x="80" y="100" width="120" height="60" rx="18" fill="#b3d1f7"/>
      <text x="140" y="135" text-anchor="middle" fill="#1a355e" font-size="16" font-weight="bold">Vision</text>
      <rect x="220" y="100" width="120" height="60" rx="18" fill="#b3f7d1"/>
      <text x="280" y="135" text-anchor="middle" fill="#1a3e2b" font-size="16" font-weight="bold">Language</text>
      <rect x="360" y="100" width="120" height="60" rx="18" fill="#f7e3b3"/>
      <text x="420" y="135" text-anchor="middle" fill="#7a4e1a" font-size="16" font-weight="bold">Speech</text>
      <rect x="500" y="100" width="120" height="60" rx="18" fill="#e3b3f7"/>
      <text x="560" y="135" text-anchor="middle" fill="#4e1a7a" font-size="16" font-weight="bold">Face</text>
    </g>
    <!-- OpenAI -->
    <g filter="url(#shadow)">
      <rect x="220" y="200" width="120" height="60" rx="18" fill="#b3e3f7"/>
      <text x="280" y="235" text-anchor="middle" fill="#1a3e7a" font-size="16" font-weight="bold">OpenAI</text>
    </g>
    <!-- Foundry -->
    <g filter="url(#shadow)">
      <rect x="360" y="200" width="120" height="60" rx="18" fill="#b3f7f7"/>
      <text x="420" y="235" text-anchor="middle" fill="#1a7a7a" font-size="16" font-weight="bold">Foundry</text>
    </g>
    <!-- Machine Learning -->
    <g filter="url(#shadow)">
      <rect x="500" y="200" width="120" height="60" rx="18" fill="#f7b3b3"/>
      <text x="560" y="235" text-anchor="middle" fill="#7a1a1a" font-size="16" font-weight="bold">Machine Learning</text>
    </g>
    <!-- Strzałki -->
    <polyline points="140,160 280,200" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="420,160 420,200" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="560,160 560,200" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="280,160 280,200" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="420,160 280,200" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
    <polyline points="560,160 420,200" fill="none" stroke="#888" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
</svg>