<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">K-Nearest Neighbors (KNN)</text>
  <!-- Axes -->
  <line x1="35" y1="155" x2="275" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="35" y1="155" x2="35" y2="25" stroke="#333" stroke-width="1.5"/>
  <polygon points="275,155 269,151 269,159" fill="#333"/>
  <polygon points="35,25 31,31 39,31" fill="#333"/>
  <text x="160" y="172" text-anchor="middle" fill="#555" font-size="9">X₁</text>
  <text x="14" y="90" text-anchor="middle" fill="#555" font-size="9" transform="rotate(-90,14,90)">X₂</text>
  <!-- Class A (blue) -->
  <circle cx="60" cy="130" r="5" fill="#4A90D9" opacity="0.7"/>
  <circle cx="75" cy="120" r="5" fill="#4A90D9" opacity="0.7"/>
  <circle cx="65" cy="105" r="5" fill="#4A90D9" opacity="0.7"/>
  <circle cx="90" cy="115" r="5" fill="#4A90D9" opacity="0.7"/>
  <circle cx="85" cy="100" r="5" fill="#4A90D9" opacity="0.7"/>
  <circle cx="100" cy="105" r="5" fill="#4A90D9" opacity="0.7"/>
  <circle cx="110" cy="95" r="5" fill="#4A90D9" opacity="0.7"/>
  <!-- Class B (orange) -->
  <circle cx="190" cy="55" r="5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="210" cy="45" r="5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="200" cy="68" r="5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="225" cy="52" r="5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="240" cy="60" r="5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="235" cy="42" r="5" fill="#F59E0B" opacity="0.7"/>
  <circle cx="250" cy="50" r="5" fill="#F59E0B" opacity="0.7"/>
  <!-- New point (?) -->
  <circle cx="140" cy="85" r="8" fill="#DC3545" opacity="0.9"/>
  <text x="140" y="89" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">?</text>
  <!-- K=5 circle -->
  <circle cx="140" cy="85" r="42" fill="none" stroke="#28A745" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="182" y="55" fill="#28A745" font-size="8" font-weight="bold">K=5</text>
  <!-- Lines to nearest neighbors -->
  <line x1="140" y1="85" x2="110" y2="95" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="140" y1="85" x2="100" y2="105" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="140" y1="85" x2="85" y2="100" stroke="#4A90D9" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="140" y1="85" x2="190" y2="55" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="140" y1="85" x2="200" y2="68" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Highlight neighbor counts -->
  <rect x="108" y="57" width="18" height="14" rx="3" fill="#4A90D9"/>
  <text x="117" y="67" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">3</text>
  <rect x="168" y="72" width="18" height="14" rx="3" fill="#F59E0B"/>
  <text x="177" y="82" text-anchor="middle" fill="#fff" font-size="8" font-weight="bold">2</text>
  <!-- Result -->
  <text x="140" y="140" text-anchor="middle" fill="#4A90D9" font-size="10" font-weight="bold">→ Klasa A (3 vs 2)</text>
  <!-- Info -->
  <rect x="290" y="28" width="178" height="140" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="300" y="46" fill="#333" font-size="11" font-weight="bold">Najbliżsi sąsiedzi</text>
  <text x="300" y="62" fill="#555" font-size="9">Patrzy na K najbliższych</text>
  <text x="300" y="75" fill="#555" font-size="9">punktów → głosowanie</text>
  <text x="300" y="95" fill="#555" font-size="9">K=5: sprawdza 5 sąsiadów</text>
  <text x="300" y="108" fill="#555" font-size="9">3 niebieskich, 2 pomarańczowe</text>
  <text x="300" y="121" fill="#4A90D9" font-size="9" font-weight="bold">→ Klasa A wygrywa!</text>
  <text x="300" y="140" fill="#555" font-size="9">Brak treningu – „lazy learner"</text>
  <text x="300" y="153" fill="#555" font-size="9">Wrażliwy na skalę cech</text>
  <text x="300" y="163" fill="#555" font-size="9">→ wymaga normalizacji</text>
</svg>