<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Support Vector Machine (SVM)</text>
  <!-- Grid -->
  <line x1="35" y1="155" x2="275" y2="155" stroke="#333" stroke-width="1.5"/>
  <line x1="35" y1="155" x2="35" y2="25" stroke="#333" stroke-width="1.5"/>
  <polygon points="275,155 269,151 269,159" fill="#333"/>
  <polygon points="35,25 31,31 39,31" fill="#333"/>
  <text x="160" y="172" text-anchor="middle" fill="#555" font-size="9">X₁</text>
  <text x="14" y="90" text-anchor="middle" fill="#555" font-size="9" transform="rotate(-90,14,90)">X₂</text>
  <!-- Class A (blue) bottom-left -->
  <circle cx="55" cy="140" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="70" cy="130" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="60" cy="118" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="85" cy="135" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="80" cy="120" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="95" cy="125" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="100" cy="110" r="5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="110" cy="120" r="5" fill="#4A90D9" opacity="0.8"/>
  <!-- Support vectors A -->
  <circle cx="110" cy="105" r="6" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <circle cx="110" cy="105" r="3" fill="#4A90D9"/>
  <circle cx="120" cy="115" r="6" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <circle cx="120" cy="115" r="3" fill="#4A90D9"/>
  <!-- Class B (orange) top-right -->
  <circle cx="185" cy="68" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="200" cy="55" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="195" cy="78" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="215" cy="48" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="225" cy="62" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="235" cy="50" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="245" cy="40" r="5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="255" cy="55" r="5" fill="#F59E0B" opacity="0.8"/>
  <!-- Support vectors B -->
  <circle cx="170" cy="82" r="6" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="170" cy="82" r="3" fill="#F59E0B"/>
  <circle cx="175" cy="70" r="6" fill="none" stroke="#F59E0B" stroke-width="2"/>
  <circle cx="175" cy="70" r="3" fill="#F59E0B"/>
  <!-- Decision boundary (hyperplane) -->
  <line x1="55" y1="55" x2="250" y2="148" stroke="#DC3545" stroke-width="2.5"/>
  <!-- Margins -->
  <line x1="70" y1="42" x2="260" y2="132" stroke="#DC3545" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <line x1="42" y1="68" x2="235" y2="158" stroke="#DC3545" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <!-- Margin arrows -->
  <line x1="148" y1="78" x2="140" y2="95" stroke="#28A745" stroke-width="1.5"/>
  <text x="158" y="90" fill="#28A745" font-size="8" font-weight="bold">margines</text>
  <!-- Info -->
  <rect x="290" y="28" width="178" height="140" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="300" y="46" fill="#333" font-size="11" font-weight="bold">Hiperpłaszczyzna</text>
  <text x="300" y="62" fill="#555" font-size="9">Szuka granicy z maksymalnym</text>
  <text x="300" y="75" fill="#555" font-size="9">marginesem między klasami</text>
  <circle cx="307" cy="92" r="5" fill="none" stroke="#4A90D9" stroke-width="2"/>
  <text x="316" y="96" fill="#333" font-size="9">Support Vectors (kluczowe)</text>
  <line x1="304" y1="110" x2="316" y2="110" stroke="#DC3545" stroke-width="2"/>
  <text x="320" y="114" fill="#333" font-size="9">Decision boundary</text>
  <text x="300" y="132" fill="#555" font-size="9">Kernel trick: mapuje dane</text>
  <text x="300" y="145" fill="#555" font-size="9">do wyższych wymiarów</text>
  <text x="300" y="160" fill="#555" font-size="9">→ nieliniowa separacja</text>
</svg>