  <text x="240" y="20" text-anchor="middle" fill="#0078D4" font-size="14" font-weight="bold">Clustering (K-Means)</text>
  <!-- Grid -->
  <line x1="60" y1="35" x2="60" y2="175" stroke="#E0E0E0" stroke-width="0.5"/>
