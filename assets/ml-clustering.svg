  <circle cx="165" cy="138" r="4" fill="#F59E0B" opacity="0.8"/>
  <circle cx="130" cy="150" r="4" fill="#F59E0B" opacity="0.8"/>
  <circle cx="158" cy="158" r="4" fill="#F59E0B" opacity="0.8"/>
  <!-- Centroid 2 -->
  <rect x="146" y="143" width="8" height="8" fill="#92400E" transform="rotate(45,150,147)"/>
  <!-- Cluster 3 (green) - right middle -->
  <circle cx="235" cy="85" r="20" fill="#28A745" opacity="0.08" stroke="#28A745" stroke-width="1" stroke-dasharray="3,2"/>
  <circle cx="225" cy="78" r="4" fill="#28A745" opacity="0.8"/>
  <circle cx="240" cy="72" r="4" fill="#28A745" opacity="0.8"/>
  <circle cx="248" cy="85" r="4" fill="#28A745" opacity="0.8"/>
