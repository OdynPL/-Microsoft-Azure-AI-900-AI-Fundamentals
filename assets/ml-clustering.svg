  <circle cx="220" cy="88" r="4" fill="#28A745" opacity="0.8"/>
  <circle cx="252" cy="75" r="4" fill="#28A745" opacity="0.8"/>
  <circle cx="238" cy="98" r="4" fill="#28A745" opacity="0.8"/>
  <!-- Centroid 3 -->
  <rect x="231" y="81" width="8" height="8" fill="#155724" transform="rotate(45,235,85)"/>
  <!-- Legend -->
  <rect x="295" y="35" width="170" height="145" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="305" y="53" fill="#333" font-size="11" font-weight="bold">Uczenie nienadzorowane</text>
  <text x="305" y="67" fill="#555" font-size="9">Brak etykiet — model sam grupuje</text>
  <circle cx="310" cy="85" r="4" fill="#4A90D9"/>
  <text x="320" y="89" fill="#333" font-size="10">Klaster 1</text>
  <circle cx="310" cy="101" r="4" fill="#F59E0B"/>
  <text x="320" y="105" fill="#333" font-size="10">Klaster 2</text>
  <circle cx="310" cy="117" r="4" fill="#28A745"/>
  <text x="320" y="121" fill="#333" font-size="10">Klaster 3</text>
  <rect x="306" y="131" width="8" height="8" fill="#333" transform="rotate(45,310,135)"/>
  <text x="320" y="139" fill="#333" font-size="10">Centroid (środek)</text>
  <text x="305" y="160" fill="#555" font-size="9" font-weight="bold">Metryki: Silhouette Score</text>
  <text x="305" y="173" fill="#555" font-size="9" font-weight="bold">Inertia (SSE) | Elbow Method</text>
