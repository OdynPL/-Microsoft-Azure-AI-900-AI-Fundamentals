  <circle cx="60" cy="50" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="72" cy="45" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="65" cy="60" r="4" fill="#4A90D9" opacity="0.8"/>
