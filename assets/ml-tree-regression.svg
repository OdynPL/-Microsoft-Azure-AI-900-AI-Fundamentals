<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Decision Tree / Random Forest Regression</text>
  <!-- Single tree -->
  <!-- Root -->
  <rect x="80" y="28" width="110" height="22" rx="5" fill="#0078D4" stroke="#005A9E" stroke-width="1"/>
  <text x="135" y="43" text-anchor="middle" fill="#fff" font-size="9" font-weight="bold">m² &gt; 60?</text>
  <!-- Left branch -->
  <line x1="110" y1="50" x2="75" y2="68" stroke="#333" stroke-width="1"/>
  <text x="82" y="62" fill="#28A745" font-size="8" font-weight="bold">Tak</text>
  <rect x="30" y="68" width="90" height="22" rx="5" fill="#0078D4" stroke="#005A9E" stroke-width="1"/>
  <text x="75" y="83" text-anchor="middle" fill="#fff" font-size="9">pokoje &gt; 3?</text>
  <!-- Right branch -->
  <line x1="160" y1="50" x2="195" y2="68" stroke="#333" stroke-width="1"/>
  <text x="182" y="62" fill="#DC3545" font-size="8" font-weight="bold">Nie</text>
  <rect x="155" y="68" width="80" height="22" rx="5" fill="#FFF4E5" stroke="#F59E0B" stroke-width="1"/>
  <text x="195" y="83" text-anchor="middle" fill="#92400E" font-size="9" font-weight="bold">ŷ = 250k</text>
  <!-- Left-Left -->
  <line x1="55" y1="90" x2="35" y2="108" stroke="#333" stroke-width="1"/>
  <rect x="5" y="108" width="60" height="22" rx="5" fill="#FFF4E5" stroke="#F59E0B" stroke-width="1"/>
  <text x="35" y="123" text-anchor="middle" fill="#92400E" font-size="9" font-weight="bold">ŷ = 520k</text>
  <!-- Left-Right -->
  <line x1="95" y1="90" x2="110" y2="108" stroke="#333" stroke-width="1"/>
  <rect x="80" y="108" width="60" height="22" rx="5" fill="#FFF4E5" stroke="#F59E0B" stroke-width="1"/>
  <text x="110" y="123" text-anchor="middle" fill="#92400E" font-size="9" font-weight="bold">ŷ = 380k</text>
  <!-- Random Forest concept -->
  <text x="135" y="148" text-anchor="middle" fill="#555" font-size="9">↑ Decision Tree (1 drzewo)</text>
  <!-- Forest visualization -->
  <rect x="280" y="35" width="45" height="55" rx="4" fill="#E8F4FD" stroke="#0078D4" stroke-width="1"/>
  <text x="302" y="55" text-anchor="middle" fill="#0078D4" font-size="8">Tree 1</text>
  <text x="302" y="68" text-anchor="middle" fill="#0078D4" font-size="8">ŷ=400k</text>
  <rect x="330" y="35" width="45" height="55" rx="4" fill="#E8F4FD" stroke="#0078D4" stroke-width="1"/>
  <text x="352" y="55" text-anchor="middle" fill="#0078D4" font-size="8">Tree 2</text>
  <text x="352" y="68" text-anchor="middle" fill="#0078D4" font-size="8">ŷ=380k</text>
  <rect x="380" y="35" width="45" height="55" rx="4" fill="#E8F4FD" stroke="#0078D4" stroke-width="1"/>
  <text x="402" y="55" text-anchor="middle" fill="#0078D4" font-size="8">Tree 3</text>
  <text x="402" y="68" text-anchor="middle" fill="#0078D4" font-size="8">ŷ=420k</text>
  <rect x="430" y="35" width="40" height="55" rx="4" fill="#E8F4FD" stroke="#0078D4" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="450" y="60" text-anchor="middle" fill="#0078D4" font-size="10">...</text>
  <!-- Arrow down -->
  <line x1="365" y1="95" x2="365" y2="112" stroke="#333" stroke-width="1.5"/>
  <polygon points="365,115 361,109 369,109" fill="#333"/>
  <text x="365" y="107" text-anchor="end" fill="#555" font-size="8" dx="-20">średnia</text>
  <!-- Final result -->
  <rect x="322" y="118" width="86" height="24" rx="5" fill="#28A745" stroke="#1E7B34" stroke-width="1.5"/>
  <text x="365" y="134" text-anchor="middle" fill="#fff" font-size="10" font-weight="bold">ŷ = 400k</text>
  <!-- Labels -->
  <text x="365" y="156" text-anchor="middle" fill="#555" font-size="9">↑ Random Forest (wiele drzew)</text>
  <text x="365" y="170" text-anchor="middle" fill="#555" font-size="9">Uśredniony wynik = mniej overfittingu</text>
</svg>