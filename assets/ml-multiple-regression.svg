<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Multiple Linear Regression – ŷ = w₁x₁ + w₂x₂ + ... + b</text>
  <!-- 3D-like axes -->
  <line x1="60" y1="150" x2="260" y2="150" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="150" x2="60" y2="30" stroke="#333" stroke-width="1.5"/>
  <line x1="60" y1="150" x2="20" y2="170" stroke="#333" stroke-width="1.5"/>
  <polygon points="260,150 254,146 254,154" fill="#333"/>
  <polygon points="60,30 56,36 64,36" fill="#333"/>
  <polygon points="20,170 28,170 24,164" fill="#333"/>
  <text x="165" y="168" text-anchor="middle" fill="#555" font-size="9">X₁ (m²)</text>
  <text x="30" y="90" text-anchor="middle" fill="#555" font-size="9" transform="rotate(-90,30,90)">Y (cena)</text>
  <text x="28" y="172" fill="#555" font-size="9">X₂ (pokoje)</text>
  <!-- Surface plane (parallelogram) -->
  <polygon points="75,135 240,100 230,55 65,90" fill="#DC3545" opacity="0.12" stroke="#DC3545" stroke-width="1.5"/>
  <!-- Points above/below plane -->
  <circle cx="90" cy="118" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="105" cy="105" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="120" cy="112" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="140" cy="95" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="155" cy="88" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="170" cy="82" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="185" cy="78" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="200" cy="72" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="215" cy="68" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="130" cy="100" r="4" fill="#4A90D9" opacity="0.8"/>
  <circle cx="160" cy="98" r="4" fill="#4A90D9" opacity="0.8"/>
  <!-- Residuals to plane -->
  <line x1="120" y1="112" x2="120" y2="106" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="98" x2="160" y2="90" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="200" y1="72" x2="200" y2="78" stroke="#F59E0B" stroke-width="1" stroke-dasharray="3,2"/>
  <!-- Info -->
  <rect x="290" y="28" width="178" height="135" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="300" y="46" fill="#333" font-size="11" font-weight="bold">Wiele cech wejściowych</text>
  <text x="300" y="62" fill="#555" font-size="9">X₁, X₂, ... Xₙ → Y</text>
  <text x="300" y="78" fill="#555" font-size="9">Płaszczyzna (lub hiperpłaszczyzna)</text>
  <text x="300" y="91" fill="#555" font-size="9">dopasowuje się do danych</text>
  <text x="300" y="110" fill="#555" font-size="9">Np. cena domu zależy od:</text>
  <text x="300" y="123" fill="#0078D4" font-size="9">• metraż, pokoje, piętro, rok</text>
  <text x="300" y="140" fill="#DC3545" font-size="10" font-style="italic" font-weight="bold">ŷ = w₁x₁ + w₂x₂ + ... + b</text>
  <text x="300" y="155" fill="#555" font-size="9">Każda cecha ma swoją wagę wᵢ</text>
</svg>