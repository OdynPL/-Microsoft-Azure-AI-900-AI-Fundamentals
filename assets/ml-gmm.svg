<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Gaussian Mixture Models (GMM)</text>
  <!-- Axes -->
  <line x1="30" y1="165" x2="260" y2="165" stroke="#333" stroke-width="1"/>
  <line x1="30" y1="165" x2="30" y2="28" stroke="#333" stroke-width="1"/>
  <!-- Gaussian 1 (blue) -->
  <ellipse cx="85" cy="70" rx="35" ry="25" fill="#4A90D9" opacity="0.12" stroke="#4A90D9" stroke-width="1.5"/>
  <ellipse cx="85" cy="70" rx="22" ry="15" fill="#4A90D9" opacity="0.15"/>
  <circle cx="75" cy="65" r="3.5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="88" cy="58" r="3.5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="80" cy="75" r="3.5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="95" cy="68" r="3.5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="85" cy="80" r="3.5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="70" cy="72" r="3.5" fill="#4A90D9" opacity="0.8"/>
  <circle cx="98" cy="78" r="3.5" fill="#4A90D9" opacity="0.8"/>
  <!-- Gaussian 2 (orange) -->
  <ellipse cx="190" cy="120" rx="40" ry="20" fill="#F59E0B" opacity="0.12" stroke="#F59E0B" stroke-width="1.5"/>
  <ellipse cx="190" cy="120" rx="25" ry="12" fill="#F59E0B" opacity="0.15"/>
  <circle cx="178" cy="118" r="3.5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="192" cy="112" r="3.5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="200" cy="122" r="3.5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="185" cy="128" r="3.5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="205" cy="115" r="3.5" fill="#F59E0B" opacity="0.8"/>
  <circle cx="175" cy="125" r="3.5" fill="#F59E0B" opacity="0.8"/>
  <!-- Overlap point (soft assignment) -->
  <circle cx="135" cy="95" r="5" fill="#9333EA" opacity="0.8"/>
  <text x="135" y="90" text-anchor="middle" fill="#9333EA" font-size="7" font-weight="bold">60% / 40%</text>
  <!-- Dashed lines to both -->
  <line x1="135" y1="95" x2="98" y2="78" stroke="#4A90D9" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="135" y1="95" x2="175" y2="118" stroke="#F59E0B" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Labels -->
  <text x="85" y="105" text-anchor="middle" fill="#4A90D9" font-size="8" font-weight="bold">μ₁, σ₁</text>
  <text x="190" y="148" text-anchor="middle" fill="#F59E0B" font-size="8" font-weight="bold">μ₂, σ₂</text>
  <!-- Info -->
  <rect x="275" y="30" width="195" height="140" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="285" y="48" fill="#333" font-size="11" font-weight="bold">Miękkie przypisanie</text>
  <text x="285" y="65" fill="#555" font-size="9">Każdy klaster = rozkład Gaussa</text>
  <text x="285" y="78" fill="#555" font-size="9">(μ = średnia, σ = rozrzut)</text>
  <text x="285" y="96" fill="#555" font-size="9" font-weight="bold">Soft vs Hard:</text>
  <text x="285" y="109" fill="#555" font-size="9">K-Means: punkt → 1 klaster</text>
  <text x="285" y="122" fill="#9333EA" font-size="9" font-weight="bold">GMM: punkt → 60% A, 40% B</text>
  <text x="285" y="140" fill="#555" font-size="9" font-weight="bold">Algorytm: EM</text>
  <text x="285" y="153" fill="#555" font-size="9">(Expectation-Maximization)</text>
  <text x="285" y="166" fill="#555" font-size="9">Iteracyjnie dopasowuje μ, σ</text>
</svg>