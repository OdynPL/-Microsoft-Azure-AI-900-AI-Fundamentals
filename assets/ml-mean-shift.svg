<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Mean Shift – przesuwanie do gęstości</text>
  <!-- Axes -->
  <line x1="30" y1="165" x2="260" y2="165" stroke="#333" stroke-width="1"/>
  <line x1="30" y1="165" x2="30" y2="28" stroke="#333" stroke-width="1"/>
  <!-- Data points cluster region -->
  <circle cx="80" cy="70" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="90" cy="60" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="75" cy="55" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="95" cy="72" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="85" cy="48" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="70" cy="65" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="100" cy="55" r="3.5" fill="#999" opacity="0.5"/>
  <!-- Another region -->
  <circle cx="180" cy="120" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="195" cy="115" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="185" cy="130" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="200" cy="125" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="175" cy="125" r="3.5" fill="#999" opacity="0.5"/>
  <circle cx="190" cy="135" r="3.5" fill="#999" opacity="0.5"/>
  <!-- Shift path 1 -->
  <circle cx="55" cy="100" r="8" fill="none" stroke="#DC3545" stroke-width="1.5"/>
  <circle cx="55" cy="100" r="2" fill="#DC3545"/>
  <line x1="63" y1="96" x2="70" y2="88" stroke="#DC3545" stroke-width="1.5"/>
  <polygon points="72,86 66,86 68,92" fill="#DC3545"/>
  <circle cx="72" cy="82" r="8" fill="none" stroke="#DC3545" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="78" y1="76" x2="82" y2="70" stroke="#DC3545" stroke-width="1.5"/>
  <polygon points="83,68 78,70 80,75" fill="#DC3545"/>
  <!-- Final centroid 1 -->
  <circle cx="85" cy="62" r="8" fill="#4A90D9" opacity="0.2" stroke="#4A90D9" stroke-width="2"/>
  <rect x="82" y="59" width="6" height="6" fill="#1E40AF" transform="rotate(45,85,62)"/>
  <!-- Shift path 2 -->
  <circle cx="220" cy="140" r="8" fill="none" stroke="#DC3545" stroke-width="1.5"/>
  <circle cx="220" cy="140" r="2" fill="#DC3545"/>
  <line x1="214" y1="136" x2="202" y2="130" stroke="#DC3545" stroke-width="1.5"/>
  <polygon points="200,129 205,126 206,132" fill="#DC3545"/>
  <!-- Final centroid 2 -->
  <circle cx="190" cy="123" r="8" fill="#F59E0B" opacity="0.2" stroke="#F59E0B" stroke-width="2"/>
  <rect x="187" y="120" width="6" height="6" fill="#92400E" transform="rotate(45,190,123)"/>
  <!-- Labels -->
  <text x="55" y="115" fill="#DC3545" font-size="8">start</text>
  <text x="220" y="155" fill="#DC3545" font-size="8">start</text>
  <!-- Info -->
  <rect x="275" y="30" width="195" height="140" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="285" y="48" fill="#333" font-size="11" font-weight="bold">Przesuwanie okna</text>
  <text x="285" y="65" fill="#555" font-size="9" font-weight="bold">Algorytm:</text>
  <text x="285" y="79" fill="#555" font-size="9">1. Umieść okno (bandwidth)</text>
  <text x="285" y="92" fill="#555" font-size="9">2. Oblicz średnią punktów</text>
  <text x="285" y="105" fill="#555" font-size="9">3. Przesuń do średniej</text>
  <text x="285" y="118" fill="#555" font-size="9">4. Powtórz aż do zbieżności</text>
  <text x="285" y="138" fill="#28A745" font-size="9" font-weight="bold">Zalety:</text>
  <text x="285" y="151" fill="#555" font-size="9">Nie wymaga podania K!</text>
  <text x="285" y="163" fill="#555" font-size="9">Sam wykrywa liczbę klastrów</text>
</svg>