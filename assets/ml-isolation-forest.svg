<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Isolation Forest – losowa izolacja</text>
  <!-- Tree 1 - normal point (deep) -->
  <rect x="20" y="32" width="60" height="18" rx="4" fill="#0078D4"/>
  <text x="50" y="44" text-anchor="middle" fill="#fff" font-size="7">x₂ &lt; 50?</text>
  <line x1="35" y1="50" x2="25" y2="60" stroke="#333" stroke-width="1"/>
  <line x1="65" y1="50" x2="75" y2="60" stroke="#333" stroke-width="1"/>
  <rect x="5" y="60" width="48" height="18" rx="4" fill="#0078D4"/>
  <text x="29" y="72" text-anchor="middle" fill="#fff" font-size="7">x₁ &lt; 30?</text>
  <rect x="60" y="60" width="38" height="18" rx="4" fill="#E8F4FD" stroke="#0078D4" stroke-width="0.5"/>
  <line x1="18" y1="78" x2="12" y2="88" stroke="#333" stroke-width="1"/>
  <line x1="40" y1="78" x2="46" y2="88" stroke="#333" stroke-width="1"/>
  <rect x="0" y="88" width="28" height="18" rx="4" fill="#0078D4"/>
  <text x="14" y="100" text-anchor="middle" fill="#fff" font-size="6">x₃ &lt; 5?</text>
  <line x1="7" y1="106" x2="5" y2="114" stroke="#333" stroke-width="1"/>
  <line x1="21" y1="106" x2="24" y2="114" stroke="#333" stroke-width="1"/>
  <!-- Normal point (deep leaf) -->
  <rect x="0" y="115" width="22" height="16" rx="3" fill="#D4EDDA" stroke="#28A745" stroke-width="1"/>
  <text x="11" y="126" text-anchor="middle" fill="#155724" font-size="7" font-weight="bold">N</text>
  <text x="50" y="140" fill="#28A745" font-size="8" font-weight="bold">Normalny: głęboko</text>
  <text x="50" y="152" fill="#555" font-size="7">(wiele podziałów potrzebnych)</text>
  <!-- Tree 2 - anomaly (shallow) -->
  <rect x="150" y="32" width="60" height="18" rx="4" fill="#0078D4"/>
  <text x="180" y="44" text-anchor="middle" fill="#fff" font-size="7">x₁ &lt; 80?</text>
  <line x1="165" y1="50" x2="155" y2="60" stroke="#333" stroke-width="1"/>
  <line x1="195" y1="50" x2="205" y2="60" stroke="#333" stroke-width="1"/>
  <rect x="140" y="60" width="38" height="18" rx="4" fill="#E8F4FD" stroke="#0078D4" stroke-width="0.5"/>
  <!-- Anomaly (shallow leaf!)  -->
  <rect x="190" y="60" width="30" height="18" rx="3" fill="#F8D7DA" stroke="#DC3545" stroke-width="2"/>
  <text x="205" y="72" text-anchor="middle" fill="#721C24" font-size="8" font-weight="bold">A!</text>
  <text x="205" y="92" fill="#DC3545" font-size="8" font-weight="bold">Anomalia: płytko</text>
  <text x="205" y="104" fill="#555" font-size="7">(1 podział wystarczył!)</text>
  <!-- Depth comparison -->
  <rect x="30" y="160" width="220" height="16" rx="3" fill="#FFF4E5" stroke="#F59E0B" stroke-width="1"/>
  <text x="140" y="172" text-anchor="middle" fill="#92400E" font-size="8" font-weight="bold">Krótka ścieżka = łatwa izolacja = anomalia</text>
  <!-- Info -->
  <rect x="275" y="30" width="195" height="140" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="285" y="48" fill="#333" font-size="11" font-weight="bold">Losowe drzewa izolacji</text>
  <text x="285" y="66" fill="#555" font-size="9" font-weight="bold">Intuicja:</text>
  <text x="285" y="79" fill="#555" font-size="9">Anomalie są „samotne" —</text>
  <text x="285" y="92" fill="#555" font-size="9">łatwo je oddzielić losowym</text>
  <text x="285" y="105" fill="#555" font-size="9">podziałem (mało cięć)</text>
  <text x="285" y="122" fill="#555" font-size="9">Normalne dane wymagają</text>
  <text x="285" y="135" fill="#555" font-size="9">wielu podziałów (głębokie)</text>
  <text x="285" y="154" fill="#DC3545" font-size="9" font-weight="bold">Anomaly Score:</text>
  <text x="285" y="166" fill="#555" font-size="9">= średnia głębokość w lesie</text>
</svg>