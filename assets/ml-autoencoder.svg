<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="Segoe UI, sans-serif">
  <rect width="480" height="180" fill="#FAFCFF" rx="8"/>
  <text x="240" y="18" text-anchor="middle" fill="#0078D4" font-size="13" font-weight="bold">Autoencoder – rekonstrukcja i błąd</text>
  <!-- Encoder -->
  <text x="45" y="35" text-anchor="middle" fill="#555" font-size="8" font-weight="bold">Input</text>
  <circle cx="45" cy="52" r="10" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
  <circle cx="45" cy="78" r="10" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
  <circle cx="45" cy="104" r="10" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
  <circle cx="45" cy="130" r="10" fill="#E8F4FD" stroke="#0078D4" stroke-width="1.5"/>
  <!-- Hidden (compressed) -->
  <text x="130" y="35" text-anchor="middle" fill="#555" font-size="8" font-weight="bold">Latent</text>
  <circle cx="130" cy="65" r="10" fill="#0078D4"/>
  <circle cx="130" cy="95" r="10" fill="#0078D4"/>
  <text x="130" y="125" text-anchor="middle" fill="#0078D4" font-size="8" font-weight="bold">kompresja</text>
  <!-- Decoder output -->
  <text x="215" y="35" text-anchor="middle" fill="#555" font-size="8" font-weight="bold">Output</text>
  <circle cx="215" cy="52" r="10" fill="#D4EDDA" stroke="#28A745" stroke-width="1.5"/>
  <circle cx="215" cy="78" r="10" fill="#D4EDDA" stroke="#28A745" stroke-width="1.5"/>
  <circle cx="215" cy="104" r="10" fill="#D4EDDA" stroke="#28A745" stroke-width="1.5"/>
  <circle cx="215" cy="130" r="10" fill="#D4EDDA" stroke="#28A745" stroke-width="1.5"/>
  <!-- Connections encoder -->
  <line x1="55" y1="52" x2="120" y2="65" stroke="#4A90D9" stroke-width="0.7" opacity="0.4"/>
  <line x1="55" y1="78" x2="120" y2="65" stroke="#4A90D9" stroke-width="0.7" opacity="0.4"/>
  <line x1="55" y1="78" x2="120" y2="95" stroke="#4A90D9" stroke-width="0.7" opacity="0.4"/>
  <line x1="55" y1="104" x2="120" y2="95" stroke="#4A90D9" stroke-width="0.7" opacity="0.4"/>
  <line x1="55" y1="130" x2="120" y2="95" stroke="#4A90D9" stroke-width="0.7" opacity="0.4"/>
  <line x1="55" y1="52" x2="120" y2="95" stroke="#4A90D9" stroke-width="0.7" opacity="0.4"/>
  <line x1="55" y1="104" x2="120" y2="65" stroke="#4A90D9" stroke-width="0.7" opacity="0.4"/>
  <line x1="55" y1="130" x2="120" y2="65" stroke="#4A90D9" stroke-width="0.7" opacity="0.4"/>
  <!-- Connections decoder -->
  <line x1="140" y1="65" x2="205" y2="52" stroke="#28A745" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="65" x2="205" y2="78" stroke="#28A745" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="95" x2="205" y2="78" stroke="#28A745" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="95" x2="205" y2="104" stroke="#28A745" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="95" x2="205" y2="130" stroke="#28A745" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="65" x2="205" y2="104" stroke="#28A745" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="65" x2="205" y2="130" stroke="#28A745" stroke-width="0.7" opacity="0.4"/>
  <line x1="140" y1="95" x2="205" y2="52" stroke="#28A745" stroke-width="0.7" opacity="0.4"/>
  <!-- Labels -->
  <text x="85" y="78" text-anchor="middle" fill="#0078D4" font-size="8">Encoder</text>
  <text x="175" y="78" text-anchor="middle" fill="#28A745" font-size="8">Decoder</text>
  <!-- Error comparison -->
  <rect x="18" y="148" width="55" height="24" rx="4" fill="#D4EDDA" stroke="#28A745" stroke-width="1"/>
  <text x="45" y="160" text-anchor="middle" fill="#155724" font-size="8" font-weight="bold">Normalny</text>
  <text x="45" y="169" text-anchor="middle" fill="#155724" font-size="7">błąd: 0.02 ✓</text>
  <rect x="80" y="148" width="55" height="24" rx="4" fill="#F8D7DA" stroke="#DC3545" stroke-width="2"/>
  <text x="107" y="160" text-anchor="middle" fill="#721C24" font-size="8" font-weight="bold">Anomalia</text>
  <text x="107" y="169" text-anchor="middle" fill="#721C24" font-size="7">błąd: 0.85 ✗</text>
  <!-- Info -->
  <rect x="275" y="30" width="195" height="140" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="285" y="48" fill="#333" font-size="11" font-weight="bold">Rekonstrukcja danych</text>
  <text x="285" y="65" fill="#555" font-size="9">Uczy się kompresować</text>
  <text x="285" y="78" fill="#555" font-size="9">i odtwarzać normalne dane</text>
  <text x="285" y="96" fill="#555" font-size="9" font-weight="bold">Anomaly Detection:</text>
  <text x="285" y="109" fill="#28A745" font-size="9">Normalne → niski błąd</text>
  <text x="285" y="122" fill="#DC3545" font-size="9">Anomalie → wysoki błąd</text>
  <text x="285" y="135" fill="#555" font-size="9">(nigdy nie widział anomalii)</text>
  <text x="285" y="152" fill="#555" font-size="9" font-weight="bold">Próg błędu:</text>
  <text x="285" y="165" fill="#555" font-size="9">błąd &gt; threshold → anomalia</text>
</svg>