<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" font-family="Segoe UI, sans-serif">
  <!-- Background -->
  <rect width="480" height="200" fill="#FAFCFF" rx="8"/>
  <!-- Title -->
  <text x="240" y="20" text-anchor="middle" fill="#0078D4" font-size="14" font-weight="bold">Classification (Logistic Regression / SVM)</text>
  <!-- Grid -->
  <line x1="60" y1="35" x2="60" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="110" y1="35" x2="110" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="160" y1="35" x2="160" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="210" y1="35" x2="210" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="260" y1="35" x2="260" y2="170" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="40" y1="55" x2="270" y2="55" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="40" y1="85" x2="270" y2="85" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="40" y1="115" x2="270" y2="115" stroke="#E0E0E0" stroke-width="0.5"/>
  <line x1="40" y1="145" x2="270" y2="145" stroke="#E0E0E0" stroke-width="0.5"/>
  <!-- Axes -->
  <line x1="40" y1="170" x2="275" y2="170" stroke="#333" stroke-width="1.5"/>
  <line x1="40" y1="170" x2="40" y2="30" stroke="#333" stroke-width="1.5"/>
  <polygon points="275,170 268,166 268,174" fill="#333"/>
  <polygon points="40,30 36,37 44,37" fill="#333"/>
  <text x="160" y="190" text-anchor="middle" fill="#333" font-size="11" font-weight="bold">Cecha X₁</text>
  <text x="15" y="100" text-anchor="middle" fill="#333" font-size="11" font-weight="bold" transform="rotate(-90,15,100)">Cecha X₂</text>
  <!-- Class A (blue circles) - left/bottom region -->
  <circle cx="60" cy="150" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="72" cy="140" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="55" cy="132" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="85" cy="148" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="78" cy="125" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="95" cy="135" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="65" cy="118" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="100" cy="120" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="90" cy="110" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="108" cy="128" r="5" fill="#4A90D9" opacity="0.85"/>
  <circle cx="110" cy="105" r="5" fill="#4A90D9" opacity="0.85"/>
  <!-- Class B (orange triangles) - right/top region -->
  <polygon points="175,82 170,92 180,92" fill="#F59E0B" opacity="0.85"/>
  <polygon points="190,70 185,80 195,80" fill="#F59E0B" opacity="0.85"/>
  <polygon points="200,58 195,68 205,68" fill="#F59E0B" opacity="0.85"/>
  <polygon points="210,75 205,85 215,85" fill="#F59E0B" opacity="0.85"/>
  <polygon points="220,50 215,60 225,60" fill="#F59E0B" opacity="0.85"/>
  <polygon points="230,65 225,75 235,75" fill="#F59E0B" opacity="0.85"/>
  <polygon points="195,90 190,100 200,100" fill="#F59E0B" opacity="0.85"/>
  <polygon points="240,55 235,65 245,65" fill="#F59E0B" opacity="0.85"/>
  <polygon points="250,45 245,55 255,55" fill="#F59E0B" opacity="0.85"/>
  <polygon points="235,80 230,90 240,90" fill="#F59E0B" opacity="0.85"/>
  <!-- Decision boundary -->
  <line x1="60" y1="60" x2="250" y2="155" stroke="#DC3545" stroke-width="2.5"/>
  <!-- Margin lines (SVM) -->
  <line x1="72" y1="48" x2="258" y2="140" stroke="#DC3545" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <line x1="50" y1="72" x2="240" y2="168" stroke="#DC3545" stroke-width="1" stroke-dasharray="5,3" opacity="0.5"/>
  <!-- Region labels -->
  <rect x="50" y="150" width="52" height="16" rx="3" fill="#4A90D9" opacity="0.15"/>
  <text x="76" y="162" text-anchor="middle" fill="#2563EB" font-size="9" font-weight="bold">Klasa A</text>
  <rect x="218" y="38" width="50" height="16" rx="3" fill="#F59E0B" opacity="0.15"/>
  <text x="243" y="50" text-anchor="middle" fill="#92400E" font-size="9" font-weight="bold">Klasa B</text>
  <!-- Legend -->
  <rect x="295" y="35" width="170" height="145" rx="6" fill="#fff" stroke="#E0E0E0" stroke-width="1"/>
  <text x="305" y="53" fill="#333" font-size="11" font-weight="bold">Granica decyzyjna</text>
  <text x="305" y="67" fill="#555" font-size="9">rozdziela klasy A i B</text>
  <circle cx="310" cy="85" r="4" fill="#4A90D9"/>
  <text x="320" y="89" fill="#333" font-size="10">Klasa A (np. zdrowy)</text>
  <polygon points="310,100 306,108 314,108" fill="#F59E0B"/>
  <text x="320" y="108" fill="#333" font-size="10">Klasa B (np. chory)</text>
  <line x1="304" y1="122" x2="316" y2="122" stroke="#DC3545" stroke-width="2"/>
  <text x="320" y="126" fill="#333" font-size="10">Decision boundary</text>
  <line x1="304" y1="140" x2="316" y2="140" stroke="#DC3545" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="320" y="144" fill="#333" font-size="10">Margines (SVM)</text>
  <text x="305" y="163" fill="#555" font-size="9" font-weight="bold">Metryki: Accuracy | Precision</text>
  <text x="305" y="175" fill="#555" font-size="9" font-weight="bold">Recall | F1 | AUC-ROC</text>
</svg>